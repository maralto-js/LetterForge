name: LetterForge
version: '1.2.0'
main: com.letterforge.LetterForge
api-version: '1.21'
authors: [ maraltinho ]
description: Sistema de cartas imersivo para RP

softdepend: [ LuckPerms, PlaceholderAPI ]

commands:
  carta:
    description: Sistema de cartas LetterForge
    usage: /carta [escrever|caixa|todos|imagem|admin|moderar|reload|ajuda]
    aliases: [ mail, correio ]

permissions:
  letterforge.use:
    description: Escrever e receber cartas
    default: true

  letterforge.broadcast:
    description: Enviar carta para todos os jogadores
    default: false

  letterforge.jornal:
    description: Publicar edicoes do jornal para todos
    default: false

  letterforge.priority.high:
    description: Enviar cartas marcadas como IMPORTANTE ou OFICIAL
    default: false

  letterforge.bypass.cooldown:
    description: Ignorar cooldown de envio
    default: false

  letterforge.image.url:
    description: Anexar imagens via URL HTTPS na carta
    default: false

  letterforge.image.upload:
    description: Fazer upload de imagem pelo navegador para anexar na carta
    default: false

  letterforge.image.unlimited:
    description: Ignorar o limite diario de imagens
    default: false

  letterforge.admin:
    description: Acesso total ao sistema de cartas
    default: op
    children:
      letterforge.use: true
      letterforge.broadcast: true
      letterforge.jornal: true
      letterforge.priority.high: true
      letterforge.bypass.cooldown: true
      letterforge.image.url: true
      letterforge.image.upload: true
      letterforge.image.unlimited: true
      letterforge.reload: true

  letterforge.reload:
    description: Recarregar configuracoes e mensagens do plugin
    default: op
