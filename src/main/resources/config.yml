# LetterForge - Configuracao

limits:
  # Maximo de cartas na caixa de cada jogador
  max-inbox: 50
  # Maximo de paginas por carta
  max-pages: 6
  # Maximo de caracteres por pagina
  max-chars-per-page: 256
  # Maximo de cartas enviadas por minuto
  max-per-minute: 5

cooldowns:
  # Cooldown padrao em segundos (substituido por meta do LuckPerms se configurado)
  default-seconds: 30
  # Cooldown para cartas anonimas
  anonymous-seconds: 120
  # Cooldown para broadcast em minutos
  broadcast-minutes: 30

# Cooldowns independentes para o sistema de imagens
image-cooldowns:
  # Cooldown entre requisicoes de URL (segundos)
  url-seconds: 30
  # Cooldown entre uploads (segundos) — maior para reduzir abuso
  upload-seconds: 60

image-limits:
  # Maximo de imagens por jogador por dia (reset a meia-noite). 0 = sem limite.
  # Isento: letterforge.image.unlimited e letterforge.admin
  daily: 3

delivery:
  # Delay para cartas normais em segundos (0 = instantaneo)
  direct-delay-seconds: 0
  # Delay para cartas anonimas em segundos (imersao)
  anonymous-delay-seconds: 30
  # Com que frequencia (em segundos) o scheduler verifica cartas com delay prontas para entrega
  check-interval-seconds: 15

cleanup:
  # ---------------------------------------------------------------
  # RETENCAO: por quantos dias cada carta fica salva, contando do
  # ENVIO e valendo para lidas E nao lidas. Passado o prazo a carta
  # some da caixa e e apagada na proxima limpeza.
  # Valor invalido ou <= 0 e ignorado (o plugin usa 15 e avisa no console).
  # ---------------------------------------------------------------
  letter-retention-days: 15
  broadcast-retention-days: 15
  # Por quantos dias cada edicao do jornal fica no arquivo (/carta jornal). 0 = usa 60.
  jornal-retention-days: 60
  # Deletar cartas LIDAS antes do fim da retencao? Este valor so age
  # se for MENOR que a retencao (padrao 30 = nao age).
  delete-read-after-days: 30
  # (legado — broadcasts agora seguem broadcast-retention-days)
  delete-broadcast-after-days: 7
  # Deletar entradas do log de auditoria apos X dias
  delete-audit-after-days: 90
  # Deletar copias de moderacao de imagens apos X dias.
  # Toda imagem enviada e guardada por este periodo para que a staff possa verificar
  # exatamente o que foi enviado (inclusive de cartas anonimas). Depois e apagada
  # automaticamente, junto com o cache em memoria, para nao encher o disco.
  delete-moderation-image-after-days: 4
  # Intervalo de limpeza em horas
  run-every-hours: 24

messages:
  prefix: '&8[&6✉ Correio&8] &r'
  no-permission: '&cVoce nao tem permissao para isso.'
  player-not-found: '&cJogador "{player}" nao encontrado.'
  letter-sent: '&aCartа enviada para &e{player}&a!'
  broadcast-sent: '&aAnuncio enviado para todos os jogadores!'
  cooldown: '&cAguarde &e{seconds}s &cantes de enviar outra carta.'
  rate-limited: '&cVoce enviou cartas rapido demais. Aguarde um momento.'
  inbox-empty: '&7Sua caixa postal esta vazia.'
  write-instructions: '&eEscreva sua carta no livro e &6assine-o &epara enviar.'

# -----------------------------------------------------------------------
# Seguranca
# -----------------------------------------------------------------------
security:
  # Dimensao maxima de imagem antes do decode completo (protecao contra PNG bomb)
  # Imagens com width ou height acima deste valor sao rejeitadas imediatamente.
  # 4096 = ate ~64 MB de heap por decode. NAO suba para 8192 sem necessidade real
  # (8192x8192 ARGB = 256 MB por imagem; varios uploads simultaneos = risco de OOM).
  max-image-dimension: 4096

# -----------------------------------------------------------------------
# Filtro de conteudo (+18)
# -----------------------------------------------------------------------
content-filter:
  # Ativar deteccao de tons de pele (HSV) nas imagens
  enabled: false
  # Fracao de pixels com tom de pele para bloquear a imagem (0.0 - 1.0)
  # 0.35 = 35% dos pixels opacos com tom de pele -> bloqueado
  skin-threshold: 0.35

# -----------------------------------------------------------------------
# Filtro NSFW via modelo ONNX local
# -----------------------------------------------------------------------
nsfw-filter:
  # Ativar requer nsfw_model.onnx na pasta do plugin
  # Baixar de: https://huggingface.co/Falconsai/nsfw_image_detection
  enabled: false
  # Score acima deste valor bloqueia a imagem (0.0 = seguro, 1.0 = nsfw)
  # Recomendado: 0.75 para reduzir falsos positivos
  threshold: 0.75
  # Avisar administradores no console quando imagem bloqueada
  notify-admin: true
  # Registrar tentativas bloqueadas no audit_log do banco de dados
  audit-log: true

# -----------------------------------------------------------------------
# Sistema de imagens em mapas
# -----------------------------------------------------------------------
image-rendering:
  # Desativar esta opcao desabilita todo o sistema de imagens
  enabled: true
  # Floyd-Steinberg dithering melhora a qualidade visual (recomendado true)
  dithering: true
  # Grid padrao ao usar /carta imagem url sem especificar tamanho
  default-grid: "1x1"
  # Tamanho maximo do grid (cada unidade = 1 mapa de 128x128)
  max-grid-w: 2
  max-grid-h: 2

image-upload:
  # Servidor HTTP embutido para upload direto pelo navegador
  enabled: true
  # Porta do servidor de upload (deve estar aberta no firewall)
  port: 8517
  # Endereco de bind. PADRAO SEGURO: "127.0.0.1" (so aceita conexoes locais).
  # O upload roda em HTTP puro (sem TLS), entao para acesso externo o RECOMENDADO e
  # colocar um proxy reverso HTTPS (Nginx/Caddy) na frente e manter este bind em 127.0.0.1.
  # Use "0.0.0.0" APENAS se entender o risco de expor a porta diretamente sem TLS.
  bind-address: "127.0.0.1"
  # IP publico ou hostname do servidor — jogadores usarao este endereco no link
  # IMPORTANTE: altere para o IP publico real do seu servidor
  server-ip: "SEU-IP-AQUI"
  # Tamanho maximo do arquivo de upload em MB
  max-file-size-mb: 5
  # Tempo de validade do token de upload em segundos (padrao: 5 minutos)
  token-ttl-seconds: 300
  # Numero maximo de uploads sendo processados simultaneamente (rejeita com 503 se exceder)
  max-concurrent: 3
